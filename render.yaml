services:
  # 1. Backend Core API (FastAPI)
  - type: web
    name: sip-core-backend
    plan: free
    runtime: python
    rootDir: backend_core_mobile
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRE_MINUTES
        value: "480"
      - key: SUPABASE_URL
        value: https://grihcjooepzerrsmizhr.supabase.co
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_STORAGE_BUCKET
        value: documentos-creditos
      - key: APP_ENV
        value: production
      - key: APP_NAME
        value: "SIP Mobile Core 360"
      - key: APP_DEBUG
        value: "false"
      - key: CORS_ORIGINS
        value: "http://localhost:8080,http://127.0.0.1:8080,http://localhost:5173,http://127.0.0.1:5173,https://sip-web-admin.onrender.com"

  # 2. Frontend Panel de Administración (React / Vite)
  - type: web
    name: sip-web-admin
    runtime: static
    rootDir: web_admin_sip
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_BASE
        value: https://sip-core-backend.onrender.com # Definimos la URL pública directamente
